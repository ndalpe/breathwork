<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#2f2f2f" />
  <meta name="description" content="A simple offline breathwork timer with custom and preset breathing patterns." />
  <link rel="manifest" href="manifest.json" />
  <title>Breathwork Timer</title>
  <style>
    :root {
      --bg: #2f2f2f;
      --panel: #3a3a3a;
      --panel-2: #444;
      --text: #d8d8d8;
      --muted: #a8a8a8;
      --button: #555;
      --button-hover: #666;
      --accent: #cfcfcf;
      --shadow: rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      overflow-x: hidden;
    }

    .app {
      width: min(960px, 100%);
      min-height: 100vh;
      padding: 18px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 18px;
      transition: padding 180ms ease;
    }

    header,
    .session-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.35rem, 4vw, 2rem);
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .icon-button {
      border: 1px solid #6a6a6a;
      border-radius: 999px;
      background: var(--button);
      color: var(--text);
      width: 46px;
      height: 46px;
      font-size: 1.15rem;
      cursor: pointer;
      box-shadow: 0 6px 18px var(--shadow);
    }

    .icon-button:hover { background: var(--button-hover); }

    main {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      align-content: start;
    }

    .timer-card {
      min-height: 42vh;
      border-radius: 28px;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.06), transparent 56%),
        var(--panel);
      box-shadow: 0 20px 50px var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      position: sticky;
      top: 12px;
      z-index: 5;
      transition: all 180ms ease;
    }

    .phase {
      color: var(--muted);
      font-size: clamp(1.25rem, 4vw, 2rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .countdown {
      line-height: 0.9;
      font-size: clamp(7.5rem, 34vw, 18rem);
      font-weight: 800;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      text-shadow: 0 10px 35px rgba(0,0,0,0.38);
    }

    .pattern-name {
      margin-top: 12px;
      color: var(--muted);
      font-size: 1rem;
    }

    .controls {
      display: flex;
      gap: 10px;
      width: 100%;
      margin-top: 20px;
    }

    button, input {
      border: 1px solid #6b6b6b;
      border-radius: 14px;
      background: var(--button);
      color: var(--text);
      padding: 12px 14px;
      font: inherit;
    }

    button {
      cursor: pointer;
      font-weight: 650;
      box-shadow: 0 6px 16px var(--shadow);
    }

    button:hover { background: var(--button-hover); }

    button.primary {
      width: 100%;
      background: #6a6a6a;
      border-color: #8a8a8a;
      font-size: 1.1rem;
      padding: 15px 18px;
    }

    button.stop { background: #585858; }

    .settings {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .panel {
      border-radius: 22px;
      background: var(--panel);
      padding: 16px;
      box-shadow: 0 12px 34px var(--shadow);
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 1.1rem;
      color: var(--accent);
    }

    .custom-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    input {
      width: 100%;
      font-size: 1.1rem;
      font-variant-numeric: tabular-nums;
    }

    .hint {
      color: var(--muted);
      line-height: 1.45;
      margin: 10px 0 0;
      font-size: 0.95rem;
    }

    footer {
      color: var(--muted);
      text-align: center;
      font-size: 0.9rem;
      padding-bottom: 10px;
    }

    .preset-menu {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: var(--bg);
      color: var(--text);
      transform: translateX(-100%);
      transition: transform 220ms ease;
      padding: 18px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 16px;
      overflow-y: auto;
    }

    .preset-menu.open { transform: translateX(0); }

    .preset-menu-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: sticky;
      top: 0;
      background: var(--bg);
      padding-bottom: 10px;
      z-index: 2;
    }

    .preset-menu h2 {
      margin: 0;
      font-size: clamp(1.4rem, 6vw, 2.4rem);
    }

    .preset-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
      align-content: start;
    }

    .preset {
      text-align: left;
      background: var(--panel);
      border-radius: 18px;
      padding: 16px;
      min-height: 124px;
    }

    .preset strong {
      display: block;
      font-size: 1.08rem;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .preset span {
      display: block;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.38;
      font-weight: 450;
    }

    .preset small {
      display: block;
      color: var(--text);
      margin-top: 10px;
      font-variant-numeric: tabular-nums;
    }

    .session-topbar {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 14px;
      z-index: 20;
      background: linear-gradient(to bottom, rgba(47,47,47,0.98), rgba(47,47,47,0.65), transparent);
    }

    .session-stats {
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      font-size: clamp(0.95rem, 3.5vw, 1.2rem);
      line-height: 1.25;
    }

    body.session-active .app {
      width: 100%;
      padding: 0;
      display: block;
    }

    body.session-active header,
    body.session-active .settings,
    body.session-active footer,
    body.session-active .pattern-name {
      display: none;
    }

    body.session-active main {
      display: block;
      min-height: 100vh;
    }

    body.session-active .session-topbar { display: flex; }

    body.session-active .timer-card {
      min-height: 100vh;
      width: 100%;
      border-radius: 0;
      position: static;
      box-shadow: none;
      padding: 88px 18px 24px;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.07), transparent 58%),
        var(--bg);
    }

    body.session-active .countdown {
      font-size: clamp(10rem, 44vw, 25rem);
    }

    body.session-active .phase {
      font-size: clamp(1.4rem, 5vw, 2.4rem);
    }

    body.session-active .controls {
      position: fixed;
      left: 14px;
      right: 14px;
      bottom: 14px;
      z-index: 25;
      margin: 0;
    }

    @media (max-width: 640px) {
      .app { padding: 12px; gap: 12px; }
      .timer-card {
        min-height: 43vh;
        border-radius: 22px;
      }
      .custom-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      button, input { padding: 11px 12px; }
      .preset-menu { padding: 12px; }
      .preset-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="preset-menu" id="presetMenu" aria-hidden="true">
    <div class="preset-menu-header">
      <h2>Breathing patterns</h2>
      <button id="closeMenuButton" class="icon-button" type="button" aria-label="Close breathing pattern menu">×</button>
    </div>
    <div id="presetGrid" class="preset-grid"></div>
  </div>

  <div class="session-topbar" aria-live="polite">
    <div class="session-stats">
      <div id="durationDisplay">00:00</div>
      <div id="breathCounterDisplay">0 breaths</div>
    </div>
    <button id="sessionMuteButton" class="icon-button" type="button" aria-label="Mute voice and chimes">🔊</button>
  </div>

  <div class="app">
    <header>
      <button id="openMenuButton" class="icon-button" type="button" aria-label="Open breathing pattern menu">☰</button>
      <h1>Breathwork Timer</h1>
      <button id="muteButton" class="icon-button" type="button" aria-label="Mute voice and chimes">🔊</button>
    </header>

    <main>
      <section class="timer-card" aria-live="polite">
        <div id="phase" class="phase">Ready</div>
        <div id="countdown" class="countdown">0</div>
        <div id="patternName" class="pattern-name">Choose a pattern or create your own.</div>
        <div class="controls">
          <button id="startStopButton" class="primary" type="button">Start</button>
        </div>
      </section>

      <section class="settings">
        <div class="panel">
          <h2>Custom pattern</h2>
          <div class="custom-grid">
            <label>Inhale
              <input id="inhaleInput" type="number" min="0" max="300" step="1" value="4" inputmode="numeric" />
            </label>
            <label>Hold
              <input id="holdAfterInhaleInput" type="number" min="0" max="300" step="1" value="7" inputmode="numeric" />
            </label>
            <label>Exhale
              <input id="exhaleInput" type="number" min="0" max="300" step="1" value="8" inputmode="numeric" />
            </label>
            <label>Hold
              <input id="holdAfterExhaleInput" type="number" min="0" max="300" step="1" value="0" inputmode="numeric" />
            </label>
          </div>
          <div class="controls">
            <button id="applyCustomButton" type="button">Use custom pattern</button>
          </div>
          <p class="hint">Use 0 for any step you want to skip. Voice clips in <code>/audio</code> will be used automatically when present.</p>
        </div>
      </section>
    </main>

    <footer>
      Breathe gently. Stop if you feel dizzy, strained, or uncomfortable.
    </footer>
  </div>

  <script>
    const presets = [
      { name: "Box breathing", times: [4, 4, 4, 4], description: "Balanced and steady, useful when you want calm focus." },
      { name: "4-7-8 breathing", times: [4, 7, 8, 0], description: "A longer exhale pattern often used for winding down." },
      { name: "Coherent breathing", times: [5, 0, 5, 0], description: "Simple rhythmic breathing for a smooth, regulated feeling." },
      { name: "Relaxing 4-6", times: [4, 0, 6, 0], description: "A gentle longer-exhale pattern for softening tension." },
      { name: "Triangle breathing", times: [4, 4, 4, 0], description: "Three equal sides that feel structured without a final hold." },
      { name: "Energizing 6-2-4", times: [6, 2, 4, 0], description: "A fuller inhale pattern for moments when you want more brightness." },
      { name: "Buteyko-style light breath", times: [3, 0, 3, 2], description: "Soft nasal breathing with a small pause after exhale." },
      { name: "Gentle sleep wave", times: [4, 2, 8, 0], description: "A quiet pattern with an elongated exhale for bedtime." },
      { name: "Equal breathing", times: [4, 0, 4, 0], description: "A very simple even rhythm when you want minimal structure." },
      { name: "Long exhale", times: [3, 0, 6, 0], description: "A compact pattern for slowing down without long holds." }
    ];

    const phaseLabels = ["Inhale", "Hold", "Exhale", "Hold"];
    const audioBasePath = "./audio/";

    const audioClipNames = {
      inhale: "inhale.mp3",
      hold: "hold.mp3",
      exhale: "exhale.mp3",
      1: "one.mp3",
      2: "two.mp3",
      3: "three.mp3",
      4: "four.mp3",
      5: "five.mp3",
      6: "six.mp3",
      7: "seven.mp3",
      8: "eight.mp3",
      9: "nine.mp3",
      10: "ten.mp3",
      11: "eleven.mp3",
      12: "twelve.mp3",
      13: "thirteen.mp3",
      14: "fourteen.mp3",
      15: "fifteen.mp3",
      16: "sixteen.mp3",
      17: "seventeen.mp3",
      18: "eighteen.mp3",
      19: "nineteen.mp3",
      20: "twenty.mp3",
      21: "twenty-one.mp3",
      22: "twenty-two.mp3",
      23: "twenty-three.mp3",
      24: "twenty-four.mp3",
      25: "twenty-five.mp3",
      26: "twenty-six.mp3",
      27: "twenty-seven.mp3",
      28: "twenty-eight.mp3",
      29: "twenty-nine.mp3",
      30: "thirty.mp3"
    };

    const clips = {};
    let activeClip = null;

    let activePattern = { name: "4-7-8 breathing", times: [4, 7, 8, 0] };
    let phaseIndex = 0;
    let remaining = activePattern.times[phaseIndex];

    let running = false;
    let intervalId = null;
    let sessionSeconds = 0;
    let completedBreaths = 0;
    let muted = localStorage.getItem("breathwork-muted") === "true";

    let audioContext = null;
    let voice = null;

    const phaseEl = document.getElementById("phase");
    const countdownEl = document.getElementById("countdown");
    const patternNameEl = document.getElementById("patternName");
    const startStopButton = document.getElementById("startStopButton");
    const muteButton = document.getElementById("muteButton");
    const sessionMuteButton = document.getElementById("sessionMuteButton");
    const presetGrid = document.getElementById("presetGrid");
    const presetMenu = document.getElementById("presetMenu");
    const durationDisplay = document.getElementById("durationDisplay");
    const breathCounterDisplay = document.getElementById("breathCounterDisplay");

    const inputs = [
      document.getElementById("inhaleInput"),
      document.getElementById("holdAfterInhaleInput"),
      document.getElementById("exhaleInput"),
      document.getElementById("holdAfterExhaleInput")
    ];

    function preloadVoiceClips() {
      Object.entries(audioClipNames).forEach(([key, filename]) => {
        const audio = new Audio(audioBasePath + filename);
        audio.preload = "auto";
        audio.volume = 0.9;
        clips[key] = audio;
      });
    }

    function loadVoice() {
      if (!("speechSynthesis" in window)) return;
      const voices = speechSynthesis.getVoices();
      voice =
        voices.find(v => v.name.toLowerCase().includes("samantha")) ||
        voices.find(v => v.name.toLowerCase().includes("google us english")) ||
        voices.find(v => v.name.toLowerCase().includes("female")) ||
        voices.find(v => v.lang && v.lang.startsWith("en")) ||
        voices[0] ||
        null;
    }

    if ("speechSynthesis" in window) {
      speechSynthesis.onvoiceschanged = loadVoice;
      loadVoice();
    }

    function validSteps(times) {
      return times.map(Number).filter(n => Number.isFinite(n) && n > 0);
    }

    function normalizeTimes(times) {
      return times.map(value => {
        const n = Math.round(Number(value));
        return Number.isFinite(n) && n >= 0 ? Math.min(n, 300) : 0;
      });
    }

    function getFirstActivePhaseIndex() {
      const index = activePattern.times.findIndex(time => time > 0);
      return index >= 0 ? index : 0;
    }

    function formatDuration(totalSeconds) {
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
    }

    function ensureAudioContext() {
      if (audioContext) return audioContext;
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return null;
      audioContext = new AudioContext();
      return audioContext;
    }

    function beep(delay = 0) {
      if (muted) return;

      const ctx = ensureAudioContext();
      if (!ctx) return;

      const startAt = ctx.currentTime + delay;
      const oscillator = ctx.createOscillator();
      const gain = ctx.createGain();

      oscillator.type = "sine";
      oscillator.frequency.setValueAtTime(660, startAt);

      gain.gain.setValueAtTime(0.0001, startAt);
      gain.gain.exponentialRampToValueAtTime(0.035, startAt + 0.015);
      gain.gain.exponentialRampToValueAtTime(0.0001, startAt + 0.22);

      oscillator.connect(gain);
      gain.connect(ctx.destination);
      oscillator.start(startAt);
      oscillator.stop(startAt + 0.24);
    }

    function minuteChime() {
      if (sessionSeconds > 0 && sessionSeconds % 300 === 0) {
        beep(0);
        beep(0.34);
      } else if (sessionSeconds > 0 && sessionSeconds % 60 === 0) {
        beep(0);
      }
    }

    function speakFallback(text) {
      if (muted || !("speechSynthesis" in window)) return;

      speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(String(text));
      utterance.voice = voice;
      utterance.rate = 0.68;
      utterance.pitch = 1.12;
      utterance.volume = 0.82;

      speechSynthesis.speak(utterance);
    }

    function playClip(key, fallbackText) {
      if (muted) return;

      const clip = clips[key];

      if (!clip) {
        speakFallback(fallbackText);
        return;
      }

      if ("speechSynthesis" in window) speechSynthesis.cancel();

      try {
        if (activeClip) {
          activeClip.pause();
          activeClip.currentTime = 0;
        }

        activeClip = clip.cloneNode(true);
        activeClip.volume = 0.9;

        const playPromise = activeClip.play();

        if (playPromise && typeof playPromise.catch === "function") {
          playPromise.catch(() => speakFallback(fallbackText));
        }
      } catch (error) {
        speakFallback(fallbackText);
      }
    }

    function speakCue(text) {
      const normalized = String(text).toLowerCase();

      if (normalized === "inhale") return playClip("inhale", "Inhale");
      if (normalized === "exhale") return playClip("exhale", "Exhale");
      if (normalized === "hold") return playClip("hold", "Hold");

      const number = Number(text);
      if (Number.isInteger(number) && number >= 1 && number <= 30) {
        return playClip(number, String(number));
      }

      speakFallback(text);
    }

    function updateMuteButtons() {
      const icon = muted ? "🔇" : "🔊";
      muteButton.textContent = icon;
      sessionMuteButton.textContent = icon;
      muteButton.setAttribute("aria-label", muted ? "Unmute voice and chimes" : "Mute voice and chimes");
      sessionMuteButton.setAttribute("aria-label", muted ? "Unmute voice and chimes" : "Mute voice and chimes");
    }

    function currentDuration() {
      return activePattern.times[phaseIndex] || 0;
    }

    function moveToNextNonZeroPhase() {
      const previousPhase = phaseIndex;

      for (let i = 0; i < 4; i++) {
        phaseIndex = (phaseIndex + 1) % 4;

        if (phaseIndex === 0 && previousPhase !== 0) {
          completedBreaths += 1;
        }

        if (activePattern.times[phaseIndex] > 0) {
          remaining = activePattern.times[phaseIndex];
          return;
        }
      }

      remaining = 0;
    }

    function setPattern(pattern) {
      activePattern = {
        name: pattern.name,
        times: normalizeTimes(pattern.times)
      };

      if (validSteps(activePattern.times).length === 0) {
        activePattern.times = [4, 0, 4, 0];
      }

      phaseIndex = getFirstActivePhaseIndex();
      remaining = currentDuration();
      sessionSeconds = 0;
      completedBreaths = 0;
      stop(false);
      render();
    }

    function render() {
      phaseEl.textContent = remaining > 0 ? phaseLabels[phaseIndex] : "Ready";
      countdownEl.textContent = remaining;
      patternNameEl.textContent = `${activePattern.name} · ${activePattern.times.join("-")} sec`;
      durationDisplay.textContent = formatDuration(sessionSeconds);
      breathCounterDisplay.textContent = `${completedBreaths} ${completedBreaths === 1 ? "breath" : "breaths"}`;
      startStopButton.textContent = running ? "Stop" : "Start";
      startStopButton.classList.toggle("stop", running);
      updateMuteButtons();
    }

    function tick() {
      if (!running) return;

      sessionSeconds += 1;
      minuteChime();

      remaining -= 1;

      if (remaining <= 0) {
        moveToNextNonZeroPhase();
        speakCue(phaseLabels[phaseIndex]);
      } else {
        setTimeout(() => speakCue(remaining), 120);
      }

      render();
    }

    function start() {
      if (validSteps(activePattern.times).length === 0) return;

      running = true;
      document.body.classList.add("session-active");

      ensureAudioContext();
      if (audioContext && audioContext.state === "suspended") {
        audioContext.resume();
      }

      speakCue(phaseLabels[phaseIndex]);
      render();

      clearInterval(intervalId);
      intervalId = setInterval(tick, 1000);
    }

    function stop(resetSession = true) {
      running = false;
      clearInterval(intervalId);
      intervalId = null;
      document.body.classList.remove("session-active");

      if (activeClip) {
        activeClip.pause();
        activeClip.currentTime = 0;
      }

      if ("speechSynthesis" in window) speechSynthesis.cancel();

      if (resetSession) {
        phaseIndex = getFirstActivePhaseIndex();
        remaining = currentDuration();
        sessionSeconds = 0;
        completedBreaths = 0;
      }

      render();
    }

    function toggleMute() {
      muted = !muted;
      localStorage.setItem("breathwork-muted", String(muted));

      if (muted) {
        if (activeClip) {
          activeClip.pause();
          activeClip.currentTime = 0;
        }

        if ("speechSynthesis" in window) speechSynthesis.cancel();
      }

      render();
    }

    function openMenu() {
      presetMenu.classList.add("open");
      presetMenu.setAttribute("aria-hidden", "false");
    }

    function closeMenu() {
      presetMenu.classList.remove("open");
      presetMenu.setAttribute("aria-hidden", "true");
    }

    function buildPresets() {
      presetGrid.innerHTML = "";

      presets.forEach(preset => {
        const button = document.createElement("button");
        button.className = "preset";
        button.type = "button";
        button.innerHTML = `
          <strong>${preset.name}</strong>
          <span>${preset.description}</span>
          <small>${preset.times.join("-")} sec</small>
        `;

        button.addEventListener("click", () => {
          inputs.forEach((input, index) => input.value = preset.times[index]);
          setPattern(preset);
          closeMenu();
        });

        presetGrid.appendChild(button);
      });
    }

    startStopButton.addEventListener("click", () => running ? stop(true) : start());
    muteButton.addEventListener("click", toggleMute);
    sessionMuteButton.addEventListener("click", toggleMute);
    document.getElementById("openMenuButton").addEventListener("click", openMenu);
    document.getElementById("closeMenuButton").addEventListener("click", closeMenu);

    document.addEventListener("keydown", event => {
      if (event.key === "Escape") closeMenu();
    });

    document.getElementById("applyCustomButton").addEventListener("click", () => {
      const times = normalizeTimes(inputs.map(input => input.value));
      setPattern({ name: "Custom pattern", times });
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js");
      });
    }

    preloadVoiceClips();
    buildPresets();
    setPattern(activePattern);
  </script>
</body>
</html>
